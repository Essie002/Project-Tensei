<!DOCTYPE html>
<!--
  Project Tensei — gateway test page.

  This is NOT the real workspace UI (that lives in tensei-prototype/). It exists
  only to prove the gateway <-> agent round trip works: type a message, it POSTs
  to /chat, and shows the real agent's reply. Use it to confirm your AWS
  credentials + harness are wired up before touching the frontend.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tensei Gateway — Test Page</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 760px; }
    #log { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; height: 380px;
           overflow-y: auto; white-space: pre-wrap; background: #fafafa; font-size: 13px; }
    .row { display: flex; gap: .5rem; margin-top: 1rem; }
    input { flex: 1; padding: .6rem; } button { padding: .6rem 1rem; }
    .meta { color: #666; font-size: 12px; } .you { color: #4f46e5; } .ai { color: #0a7; }
  </style>
</head>
<body>
  <h1>Project Tensei — Gateway Test Page</h1>
  <p class="meta">Session: <span id="sid">(none yet)</span> · <a href="/health" target="_blank">check /health</a></p>
  <div id="log"></div>
  <div class="row">
    <input id="msg" placeholder="Type a message to the Coordinator agent..." />
    <button id="send">Send</button>
  </div>

  <script>
    const log = (line, cls = "") => {
      const el = document.getElementById("log");
      el.innerHTML += `<div class="${cls}">${line}</div>`;
      el.scrollTop = el.scrollHeight;
    };

    // Same-origin: this page is served BY the gateway, so relative URLs work.
    let sessionId = null;

    async function ensureSession() {
      if (sessionId) return sessionId;
      const res = await fetch("/session", { method: "POST" });
      sessionId = (await res.json()).sessionId;
      document.getElementById("sid").textContent = sessionId;
      return sessionId;
    }

    async function send() {
      const input = document.getElementById("msg");
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      log("You: " + text, "you");

      await ensureSession();
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, sessionId }),
        });
        if (!res.ok) { log(`(error ${res.status}) ${await res.text()}`); return; }
        const data = await res.json();
        log("Agent: " + data.reply, "ai");
      } catch (err) {
        log("(network error) " + err);
      }
    }

    document.getElementById("send").onclick = send;
    document.getElementById("msg").addEventListener("keypress", (e) => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
