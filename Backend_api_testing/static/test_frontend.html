
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tensei — Live Context Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            color: #f9fafb;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #9ca3af;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-container {
            display: flex;
            height: calc(100vh - 65px);
        }

        /* ─── LEFT: Trigger Panel ─── */
        .trigger-panel {
            width: 320px;
            background: #111827;
            border-right: 1px solid #1f2937;
            padding: 20px;
            overflow-y: auto;
        }

        .trigger-panel h2 {
            font-size: 14px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .trigger-btn {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f9fafb;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .trigger-btn:hover {
            background: #374151;
            border-color: #4b5563;
        }

        .trigger-btn.active {
            border-color: #3b82f6;
            background: #1e3a5f;
        }

        .trigger-btn .label {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .trigger-btn .desc {
            font-size: 12px;
            color: #9ca3af;
        }

        /* ─── RIGHT: Live Context Panel ─── */
        .context-panel {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background: #1f2937;
        }

        .agent-card {
            background: #111827;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .agent-card-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .agent-card-header .agent-name {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .badge-data { background: #064e3b; color: #6ee7b7; }
        .badge-control { background: #1e3a5f; color: #93c5fd; }
        .badge-task { background: #4c1d95; color: #c4b5fd; }

        .agent-status {
            font-size: 11px;
            color: #6b7280;
        }

        .agent-status.active {
            color: #fbbf24;
        }

        .agent-status.complete {
            color: #22c55e;
        }

        .agent-card-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #d1d5db;
        }

        .agent-card-body .chunk {
            animation: fadeIn 0.1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .agent-card-body .thinking {
            color: #6b7280;
            font-style: italic;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #111827;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }

        /* ─── Timeline indicator ─── */
        .timeline {
            padding: 12px 20px;
            background: #111827;
            border-top: 1px solid #1f2937;
            font-size: 12px;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timeline-step {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .timeline-step.active {
            color: #fbbf24;
        }

        .timeline-step.complete {
            color: #22c55e;
        }

        .timeline-arrow {
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Project Tensei — Live Context Panel</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <div class="main-container">
        <!-- Left: Trigger Panel -->
        <div class="trigger-panel">
            <h2>Trigger Scenarios</h2>

            <button class="trigger-btn" onclick="triggerScenario('health_alert')">
                <div class="label">🔴 Proactive Health Alert</div>
                <div class="desc">EC2 packet loss detected in us-east-1a — customer unaware</div>
            </button>

            <button class="trigger-btn" onclick="triggerScenario('customer_case')">
                <div class="label">💬 Customer Case (Complex)</div>
                <div class="desc">Customer reports intermittent timeouts — needs investigation</div>
            </button>

            <button class="trigger-btn" onclick="triggerScenario('sev1_critical')">
                <div class="label">🚨 Sev1 Critical — System Down</div>
                <div class="desc">Complete RDS outage — production database unreachable</div>
            </button>

            <button class="trigger-btn" onclick="clearPanels()">
                <div class="label">🗑️ Clear All Panels</div>
                <div class="desc">Reset the live context view</div>
            </button>
        </div>

        <!-- Right: Live Context Grid -->
        <div class="context-panel">
            <!-- Sensor Agent -->
            <div class="agent-card">
                <div class="agent-card-header">
                    <div class="agent-name">
                        📡 Sensor Agent
                        <span class="agent-badge badge-data">DATA PLANE</span>
                    </div>
                    <div class="agent-status" id="status-sensor">Idle</div>
                </div>
                <div class="agent-card-body" id="panel-sensor"></div>
            </div>

            <!-- Coordinator Agent -->
            <div class="agent-card">
                <div class="agent-card-header">
                    <div class="agent-name">
                        🧠 Coordinator Agent
                        <span class="agent-badge badge-control">CONTROL PLANE</span>
                    </div>
                    <div class="agent-status" id="status-coordinator">Idle</div>
                </div>
                <div class="agent-card-body" id="panel-coordinator"></div>
            </div>

            <!-- Control Agent -->
            <div class="agent-card">
                <div class="agent-card-header">
                    <div class="agent-name">
                        ⚙️ Control Agent
                        <span class="agent-badge badge-control">CONTROL PLANE</span>
                    </div>
                    <div class="agent-status" id="status-control">Idle</div>
                </div>
                <div class="agent-card-body" id="panel-control"></div>
            </div>

            <!-- Task Agents -->
            <div class="agent-card">
                <div class="agent-card-header">
                    <div class="agent-name">
                        🔧 Task Agents
                        <span class="agent-badge badge-task">TASK PLANE</span>
                    </div>
                    <div class="agent-status" id="status-task">Idle</div>
                </div>
                <div class="agent-card-body" id="panel-task"></div>
            </div>
        </div>
    </div>

    <!-- Timeline -->
    <div class="timeline">
        <span class="timeline-step" id="step-sensor">● Sensor</span>
        <span class="timeline-arrow">→</span>
        <span class="timeline-step" id="step-coordinator">● Coordinator</span>
        <span class="timeline-arrow">→</span>
        <span class="timeline-step" id="step-control">● Control</span>
        <span class="timeline-arrow">→</span>
        <span class="timeline-step" id="step-task">● Tasks</span>
        <span class="timeline-arrow">→</span>
        <span class="timeline-step" id="step-complete">● Complete</span>
    </div>

    <script>
        // ============================================================
        // WebSocket Connection
        // ============================================================
        let ws = null;

        function connect() {
            ws = new WebSocket("ws://localhost:8000/ws/orchestrate");

            ws.onopen = () => {
                document.getElementById("statusDot").classList.add("connected");
                document.getElementById("statusText").textContent = "Connected";
            };

            ws.onclose = () => {
                document.getElementById("statusDot").classList.remove("connected");
                document.getElementById("statusText").textContent = "Disconnected";
                // Reconnect after 3 seconds
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        // ============================================================
        // Message Handler — Routes WebSocket messages to panels
        // ============================================================
        function handleMessage(data) {
            switch (data.type) {
                case "orchestration_start":
                    resetTimeline();
                    break;

                case "agent_start":
                    onAgentStart(data.agent);
                    break;

                case "agent_chunk":
                    onAgentChunk(data.agent, data.chunk);
                    break;

                case "agent_complete":
                    onAgentComplete(data.agent);
                    break;

                case "agent_error":
                    onAgentError(data.agent, data.error);
                    break;

                case "orchestration_complete":
                    onOrchestrationComplete();
                    break;
            }
        }

        // ============================================================
        // Panel Updates
        // ============================================================

        // Map agent names to their panel
        function getPanelId(agent) {
            if (agent === "sensor") return "sensor";
            if (agent === "coordinator") return "coordinator";
            if (agent === "control") return "control";
            // All task agents go to the task panel
            return "task";
        }

        function onAgentStart(agent) {
            const panelId = getPanelId(agent);
            const statusEl = document.getElementById(`status-${panelId}`);
            const panelEl = document.getElementById(`panel-${panelId}`);

            statusEl.textContent = "Thinking...";
            statusEl.className = "agent-status active";

            // For task agents, add a separator with the agent name
            if (panelId === "task") {
                panelEl.innerHTML += `\n<span style="color:#fbbf24;font-weight:bold;">── ${agent.toUpperCase()} ──</span>\n`;
            }

            // Update timeline
            const stepEl = document.getElementById(`step-${panelId}`);
            if (stepEl) stepEl.className = "timeline-step active";

            // Auto-scroll
            panelEl.scrollTop = panelEl.scrollHeight;
        }

        function onAgentChunk(agent, chunk) {
            const panelId = getPanelId(agent);
            const panelEl = document.getElementById(`panel-${panelId}`);

            // Append chunk with animation
            const span = document.createElement("span");
            span.className = "chunk";
            span.textContent = chunk;
            panelEl.appendChild(span);

            // Auto-scroll to bottom
            panelEl.scrollTop = panelEl.scrollHeight;
        }

        function onAgentComplete(agent) {
            const panelId = getPanelId(agent);
            const statusEl = document.getElementById(`status-${panelId}`);

            statusEl.textContent = "Complete ✓";
            statusEl.className = "agent-status complete";

            // Update timeline
            const stepEl = document.getElementById(`step-${panelId}`);
            if (stepEl) stepEl.className = "timeline-step complete";
        }

        function onAgentError(agent, error) {
            const panelId = getPanelId(agent);
            const panelEl = document.getElementById(`panel-${panelId}`);
            const statusEl = document.getElementById(`status-${panelId}`);

            panelEl.innerHTML += `\n<span style="color:#ef4444;">ERROR: ${error}</span>`;
            statusEl.textContent = "Error ✗";
            statusEl.style.color = "#ef4444";
        }

        function onOrchestrationComplete() {
            const stepEl = document.getElementById("step-complete");
            stepEl.className = "timeline-step complete";
        }

        // ============================================================
        // Trigger Scenarios
        // ============================================================

        const SCENARIOS = {
            health_alert: {
                trigger_type: "health_alert",
                payload: `[CLOUDWATCH HEALTH ALERT — EventBridge Push]

Event Type: AWS_EC2_OPERATIONAL_ISSUE
Event Category: issue
Region: us-east-1
Availability Zone: us-east-1a
Timestamp: 2026-07-22T12:30:00Z
Status: open

Affected Service: Amazon EC2
Event Description: "Increased packet loss for EC2 instances in us-east-1a. 
We are investigating connectivity issues affecting instances in this 
availability zone."

Affected Resources:
- i-0abc123def456 (web-server-prod-1) — Enterprise Account
- i-0def789ghi012 (web-server-prod-2) — Enterprise Account  
- i-0jkl345mno678 (api-server-prod-1) — Enterprise Account

Account: 123456789012
Customer: Acme Corp
Support Tier: Enterprise
Account Health: 2 CloudWatch alarms in ALARM state (NetworkPacketsDropped, UnhealthyHostCount)

Process this health alert and create a structured context summary.`
            },

            customer_case: {
                trigger_type: "customer_case",
                payload: `[CUSTOMER APPROVED CONTEXT SUMMARY]

Issue Summary: Customer experiencing intermittent timeouts on production 
web application hosted on EC2 instances.

Reported Symptoms:
- HTTP 504 Gateway Timeout errors (approximately 30% of requests)
- Load balancer health checks failing intermittently
- Application response times increased from 200ms to 5000ms+

Services Affected: Amazon EC2, Elastic Load Balancing
Region: us-east-1
Started: 2026-07-22T12:20:00Z (approximately 25 minutes ago)

Business Impact:
- E-commerce checkout flow affected
- Estimated 30% of transactions failing
- Revenue impact: ~$12,000/hour

Customer Environment:
- 3 EC2 instances behind an ALB in us-east-1a
- Auto-scaling group (min: 3, max: 10)
- RDS MySQL backend in us-east-1a

Troubleshooting Already Attempted:
- Rebooted one instance (i-0abc123def456) — issue persists
- Checked application logs — no application-level errors

Severity Assessment (Customer's View): High — production impacted

Customer: Acme Corp (Enterprise Support)
Account ID: 123456789012
Contact: John Smith, Senior DevOps Engineer

Restructure this into standard sensor format for the Coordinator.`
            },

            sev1_critical: {
                trigger_type: "health_alert",
                payload: `[CLOUDWATCH HEALTH ALERT — EventBridge Push]

Event Type: AWS_RDS_OPERATIONAL_ISSUE
Event Category: issue
Region: us-east-1
Availability Zone: us-east-1a
Timestamp: 2026-07-22T14:00:00Z
Status: open

Affected Service: Amazon RDS
Event Description: "RDS instance connectivity failure. Primary database 
instance is unreachable. Multi-AZ failover has NOT triggered automatically.
Complete database connectivity loss detected."

Affected Resources:
- db-prod-primary-001 (MySQL 8.0, db.r5.2xlarge) — UNREACHABLE
- db-prod-replica-001 (Read Replica) — UNREACHABLE

Account: 123456789012
Customer: Acme Corp
Support Tier: Enterprise
Account Health: 
- 5 CloudWatch alarms in ALARM state
- DatabaseConnections: 0 (baseline: 450)
- CPUUtilization: 0% (baseline: 35%)
- FreeStorageSpace: UNKNOWN
- All application health checks: FAILING

Additional Signals:
- Customer's entire application stack is DOWN
- No recent maintenance windows scheduled
- No recent parameter group changes
- Last successful backup: 2026-07-22T06:00:00Z

Process this CRITICAL health alert and create a structured context summary.`
            }
        };

        function triggerScenario(scenarioName) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Not connected to backend. Make sure FastAPI is running.");
                return;
            }

            // Clear panels first
            clearPanels();

            // Highlight active button
            document.querySelectorAll(".trigger-btn").forEach(btn => btn.classList.remove("active"));
            event.currentTarget.classList.add("active");

            // Send to backend
            ws.send(JSON.stringify(SCENARIOS[scenarioName]));
        }

        function clearPanels() {
            document.getElementById("panel-sensor").innerHTML = "";
            document.getElementById("panel-coordinator").innerHTML = "";
            document.getElementById("panel-control").innerHTML = "";
            document.getElementById("panel-task").innerHTML = "";

            ["sensor", "coordinator", "control", "task"].forEach(id => {
                document.getElementById(`status-${id}`).textContent = "Idle";
                document.getElementById(`status-${id}`).className = "agent-status";
            });

            resetTimeline();
        }

        function resetTimeline() {
            ["sensor", "coordinator", "control", "task", "complete"].forEach(id => {
                const el = document.getElementById(`step-${id}`);
                if (el) el.className = "timeline-step";
            });
        }

        // ============================================================
        // Connect on page load
        // ============================================================
        connect();
    </script>
</body>
</html>
